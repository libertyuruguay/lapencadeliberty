<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penca Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #0b3d91, #001f4d);
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:30px 20px;
}

.logo {
  width:180px;
  margin-bottom:10px;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* GLASS CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:20px;
  margin:15px 0;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* INPUTS */
input {
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  width:80px;
  text-align:center;
}

/* BUTTON */
button {
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background: linear-gradient(45deg,#00c2ff,#007bff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

/* RANKING */
table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td, th {
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

tr:hover {
  background:rgba(255,255,255,0.1);
}

/* TOP 3 */
.top1 { color:gold; font-weight:bold; }
.top2 { color:silver; }
.top3 { color:#cd7f32; }

</style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/yourlogo.png" class="logo">
  <h1>🏆 PENCA LIBERTY</h1>
</div>

<div class="container">

  <div class="card">
    <h2>Ingresá tu nombre</h2>
    <input id="nombre" placeholder="Nombre / Agencia" style="width:250px;">
  </div>

  <div id="partidos"></div>

  <div class="card">
    <h2>🏆 Ranking en vivo</h2>
    <table id="ranking"></table>
  </div>

</div>

<script>

const SCRIPT = "PEGAR_WEBAPP";
const PARTIDOS = "CSV_PARTIDOS";
const RANKING = "CSV_RANKING";

/* PARTIDOS */
fetch(PARTIDOS)
.then(r=>r.text())
.then(data=>{
  let filas = data.split("\n").slice(1);
  let html="";

  filas.forEach(f=>{
    let c = f.split(",");
    if(c[7]!="ABIERTO") return;

    html += `
    <div class="card">
      <h3>${c[1]} vs ${c[2]}</h3>
      <p>${c[3]} ${c[4]}</p>

      <input type="number" id="a${c[0]}" placeholder="${c[1]}">
      <input type="number" id="b${c[0]}" placeholder="${c[2]}">

      <br><br>
      <button onclick="enviar(${c[0]})">Enviar Pronóstico</button>
    </div>`;
  });

  document.getElementById("partidos").innerHTML = html;
});

/* ENVIAR */
function enviar(id){
  fetch(SCRIPT,{
    method:"POST",
    body:JSON.stringify({
      nombre:document.getElementById("nombre").value,
      partido:id,
      golesA:document.getElementById("a"+id).value,
      golesB:document.getElementById("b"+id).value
    })
  })
  .then(r=>r.text())
  .then(msg=>{
    alert(msg);
  });
}

/* RANKING LIVE */
setInterval(()=>{
fetch(RANKING)
.then(r=>r.text())
.then(data=>{
  let filas = data.split("\n").slice(1);
  let html="<tr><th>Pos</th><th>Nombre</th><th>Puntos</th></tr>";

  filas.forEach((f,i)=>{
    let c=f.split(",");
    let clase = i==0?"top1":i==1?"top2":i==2?"top3":"";

    html += `<tr class="${clase}">
      <td>${i+1}</td>
      <td>${c[0]}</td>
      <td>${c[1]}</td>
    </tr>`;
  });

  document.getElementById("ranking").innerHTML = html;
});
},4000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penca Liberty 2026</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b3a6f;
  color:white;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0b3a6f;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>⚽ Liberty 2026</h2>

<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Ingresar</button>
<button onclick="register()">Registrarse</button>
</div>

<div id="app" style="display:none;">
<h3 id="nombre"></h3>

<div class="card">
<h4>Argentina vs Brasil</h4>

<input id="gA" type="number" placeholder="Goles A">
<input id="gB" type="number" placeholder="Goles B">

<button onclick="guardar()">Guardar</button>
</div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxXF2g_80cnzR9m741tbg3lyGV2_XG4OmuKvyrNHh305L9OlOZ_L41Spx8LcfPen0d9fQ/exec";

let userId = null;

function login(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
email:email.value,
password:password.value
})
})
.then(r=>r.json())
.then(data=>{
if(data.success){
userId = data.userId;
nombre.innerText = "Hola " + data.nombre;
loginBox.style.display="none";
app.style.display="block";
}else{
alert("Datos incorrectos");
}
});
}

function register(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"register",
nombre:email.value,
email:email.value,
password:password.value
})
})
.then(()=>alert("Registrado"));
}

function guardar(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"guardarPronostico",
userId:userId,
partidoId:1,
golesA:gA.value,
golesB:gB.value
})
})
.then(()=>alert("Pronóstico guardado"));
}
</script>

</body>
</html>
